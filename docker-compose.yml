services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "JeeSiteNET_Docker_2024!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "JeeSiteNET_Docker_2024!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  webapi:
    build:
      context: .
      dockerfile: src/JeeSiteNET.Web.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=JeeSiteNET;User Id=sa;Password=JeeSiteNET_Docker_2024!;TrustServerCertificate=true"
      Redis__Connection: "redis:6379"
      Redis__InstanceName: "JeeSiteNET"
      Jwt__Secret: "JeeSiteNET_Docker_Secret_Key_32_Chars_Long_2024!"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - webapi

volumes:
  sqlserver-data:
  redis-data:

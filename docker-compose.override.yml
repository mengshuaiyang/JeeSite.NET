services:
  webapi:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080;https://+:8081
    volumes:
      - ./src:/src/src
      - ./modules:/src/modules
      - ~/.nuget/packages:/root/.nuget/packages:ro

  frontend:
    build:
      args:
        - NODE_ENV=development
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "3000:80"
      - "5173:5173"

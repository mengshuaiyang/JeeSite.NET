name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: JeeSiteNET_CI_2024!
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P JeeSiteNET_CI_2024! -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: minio/minio:latest
        command: server /data
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "mc ready local"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.17.2
        ports:
          - 9200:9200
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: -Xms512m -Xmx512m
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore
      - run: dotnet build --no-restore
      - run: dotnet test --no-build --configuration Debug
        env:
          ConnectionStrings__DefaultConnection: Server=localhost;Database=JeeSiteNET_CI;User Id=sa;Password=JeeSiteNET_CI_2024!;TrustServerCertificate=true
          Redis__Connection: localhost:6379
          Redis__InstanceName: JeeSiteNET
          Jwt__Secret: JeeSiteNET_CI_Secret_Key_32_Chars_Long_2024!
          Storage__Provider: s3
          Storage__S3__Endpoint: localhost:9000
          Storage__S3__AccessKey: minioadmin
          Storage__S3__SecretKey: minioadmin
          Storage__S3__Bucket: files
          Storage__S3__UseSsl: "false"
          Elasticsearch__Url: http://localhost:9200

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: corepack prepare pnpm@9.12.3 --activate
      - run: pnpm --version
      - run: pnpm config get onlyBuiltDependencies
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: JeeSiteNET_CI_2024!
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P JeeSiteNET_CI_2024! -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.3 --activate
      - name: Restore & build frontend
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium
      - name: Start backend API
        run: |
          dotnet run --project src/JeeSiteNET.Web.Api --urls "http://localhost:5000" &
          for i in $(seq 1 30); do
            if curl -f http://localhost:5000/api/v1/health 2>/dev/null; then
              echo "Backend ready"
              break
            fi
            echo "Waiting for backend..."
            sleep 5
          done
        env:
          ASPNETCORE_ENVIRONMENT: CI
      - name: Start frontend dev server
        run: |
          pnpm dev --host 0.0.0.0 --port 3000 &
          for i in $(seq 1 20); do
            if curl -f http://localhost:3000 2>/dev/null; then
              echo "Frontend ready"
              break
            fi
            echo "Waiting for frontend..."
            sleep 3
          done
      - name: Run Playwright e2e tests
        run: pnpm test:e2e
